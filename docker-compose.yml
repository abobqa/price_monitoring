services:
  postgres:
    image: postgres:15-alpine
    container_name: price_monitoring_db
    environment:
      POSTGRES_DB: price_monitoring
      POSTGRES_USER: de_user
      POSTGRES_PASSWORD: de_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init_schema.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U de_user -d price_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: price_monitoring_airflow:latest
    container_name: price_monitoring_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment: &airflow_env
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://de_user:de_password@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      POSTGRES_HOST: postgres
      INGEST_MODE: demo
      RAW_DATA_DIR: /opt/airflow/data/raw
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./sql:/opt/airflow/sql
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow connections add app_postgres --conn-uri postgresql+psycopg2://de_user:de_password@postgres:5432/price_monitoring || true
        airflow users create -r Admin -u admin -e admin@example.com -f Admin -l User -p admin || true

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: price_monitoring_airflow:latest
    container_name: price_monitoring_airflow_web
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow_env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./sql:/opt/airflow/sql
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: price_monitoring_airflow:latest
    container_name: price_monitoring_airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow_env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./sql:/opt/airflow/sql
    command: scheduler

volumes:
  postgres_data:
